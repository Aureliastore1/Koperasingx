<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F766E">
    <link rel="icon" type="image/png" href="/favicon.png.png">
    <title>Settings | Admin KAS NGX</title>
    <meta name="robots" content="noindex, nofollow">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] },
                    colors: {
                        'kop': {
                            50: '#F0FDFA', 100: '#CCFBF1', 200: '#99F6E4', 300: '#5EEAD4',
                            400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488', 700: '#0F766E',
                            800: '#115E59', 900: '#134E4A', 950: '#042F2E',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-inter antialiased bg-gray-50">

    <div class="flex min-h-screen">

        <!-- Sidebar -->
        <aside class="ngx-admin-sidebar hidden lg:flex flex-col p-5">
            <div class="flex items-center gap-2.5 mb-8 px-1">
                <div class="w-9 h-9 bg-white/10 rounded-lg flex items-center justify-center border border-white/20">
                    <i data-lucide="landmark" class="w-4 h-4 text-white"></i>
                </div>
                <div>
                    <p class="text-white font-bold text-sm">KAS NGX</p>
                    <p class="text-white/40 text-[10px]">Admin Panel</p>
                </div>
            </div>

            <nav class="flex flex-col gap-1 flex-1">
                <a href="/admin/dashboard/" class="ngx-admin-nav-item"><i data-lucide="layout-dashboard" class="w-4 h-4"></i> Dashboard</a>
                <a href="/admin/anggota/" class="ngx-admin-nav-item"><i data-lucide="users" class="w-4 h-4"></i> Data Anggota</a>
                <a href="/admin/pinjaman/" class="ngx-admin-nav-item"><i data-lucide="banknote" class="w-4 h-4"></i> Pinjaman</a>
                <a href="/admin/pengeluaran/" class="ngx-admin-nav-item"><i data-lucide="receipt" class="w-4 h-4"></i> Catatan Bulanan</a>
                <a href="/admin/simpanan/" class="ngx-admin-nav-item"><i data-lucide="piggy-bank" class="w-4 h-4"></i> Simpanan</a>
                <a href="/admin/followup/" class="ngx-admin-nav-item"><i data-lucide="phone-call" class="w-4 h-4"></i> Follow Up</a>
                <div class="ngx-admin-nav-item segera"><i data-lucide="file-bar-chart" class="w-4 h-4"></i> Laporan <span class="ngx-admin-badge-segera">Segera</span></div>
                <a href="/admin/users/" class="ngx-admin-nav-item"><i data-lucide="shield" class="w-4 h-4"></i> Kelola Admin</a>
                <a href="/admin/settings/" class="ngx-admin-nav-item aktif"><i data-lucide="settings" class="w-4 h-4"></i> Settings</a>
            </nav>

            <a href="/" class="ngx-admin-nav-item"><i data-lucide="arrow-left" class="w-4 h-4"></i> Kembali ke Website</a>
        </aside>

        <!-- Main -->
        <div class="flex-1 flex flex-col min-w-0">

            <header class="ngx-admin-topbar px-5 py-4 flex items-center justify-between">
                <div>
                    <h1 class="text-base font-bold text-gray-900">Settings</h1>
                    <p class="text-xs text-gray-400">Pengaturan akun Anda</p>
                </div>
                <div class="flex items-center gap-3">
                    <div class="text-right hidden sm:block">
                        <p class="text-xs font-bold text-gray-800" id="userNama">-</p>
                        <p class="text-[11px] text-kop-600" id="userRole">-</p>
                    </div>
                    <div class="w-9 h-9 bg-kop-700 rounded-full flex items-center justify-center text-white text-xs font-bold" id="userAvatar">-</div>
                    <button id="btnLogout" class="text-gray-400 hover:text-red-500 transition" title="Logout"><i data-lucide="log-out" class="w-4 h-4"></i></button>
                </div>
            </header>

            <main class="p-5 flex-1 overflow-y-auto max-w-xl">

                <!-- Info Akun -->
                <div class="ngx-admin-table-card mb-5">
                    <p class="text-sm font-bold text-gray-800 mb-4">Info Akun</p>
                    <div class="space-y-2 text-sm">
                        <div class="flex justify-between"><span class="text-gray-500">Nama</span><span class="font-semibold text-gray-800" id="infoNama">-</span></div>
                        <div class="flex justify-between"><span class="text-gray-500">Username</span><span class="font-semibold text-gray-800" id="infoUsername">-</span></div>
                        <div class="flex justify-between"><span class="text-gray-500">Role</span><span class="font-semibold text-gray-800" id="infoRole">-</span></div>
                    </div>
                </div>

                <!-- Ganti Password -->
                <div class="ngx-admin-table-card">
                    <p class="text-sm font-bold text-gray-800 mb-1">Ganti Password</p>
                    <p class="text-xs text-gray-400 mb-4">Untuk keamanan akun Anda sendiri</p>

                    <form id="formGantiPassword" class="space-y-4">
                        <div>
                            <label class="ngx-form-label">Password Lama</label>
                            <input type="password" id="stPasswordLama" required autocomplete="current-password" class="ngx-form-input">
                        </div>
                        <div>
                            <label class="ngx-form-label">Password Baru</label>
                            <input type="password" id="stPasswordBaru" required autocomplete="new-password" class="ngx-form-input">
                            <p class="text-[11px] text-gray-400 mt-1">Minimal 4 karakter.</p>
                        </div>
                        <div>
                            <label class="ngx-form-label">Konfirmasi Password Baru</label>
                            <input type="password" id="stPasswordKonfirmasi" required autocomplete="new-password" class="ngx-form-input">
                        </div>

                        <p id="stError" class="hidden text-xs text-red-600"></p>

                        <button type="submit" id="btnGantiPassword" class="w-full inline-flex items-center justify-center gap-2 bg-kop-700 text-white text-sm font-bold py-3 rounded-xl hover:bg-kop-800 transition">
                            <i data-lucide="key-round" class="w-4 h-4"></i> Ganti Password
                        </button>
                    </form>
                </div>

            </main>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/admin/admin.js"></script>
    <script src="/admin/settings/settings.js"></script>
</body>
</html>
