<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0F766E">
    <link rel="icon" type="image/png" href="/favicon.png.png">
    <link rel="shortcut icon" href="/favicon.png.png">
    <link rel="apple-touch-icon" href="/favicon.png.png">

    <title>Formulir Pinjaman | Koperasi Simpan Pinjam NGX</title>
    <meta name="description" content="Ajukan pinjaman anggota Koperasi Simpan Pinjam NGX secara online.">
    <meta property="og:title" content="Formulir Pinjaman | KAS NGX">
    <meta property="og:description" content="Ajukan pinjaman secara online, proses cepat dan mudah.">
    <meta property="og:url" content="https://koperasingx.web.id/pinjaman">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 'inter': ['Inter', 'sans-serif'] },
                    colors: {
                        'kop': {
                            50: '#F0FDFA', 100: '#CCFBF1', 200: '#99F6E4', 300: '#5EEAD4',
                            400: '#2DD4BF', 500: '#14B8A6', 600: '#0D9488', 700: '#0F766E',
                            800: '#115E59', 900: '#134E4A', 950: '#042F2E',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-inter bg-gray-50 antialiased overflow-x-hidden">

    <!-- Nav ringkas -->
    <nav class="ngx-page-nav">
        <div class="max-w-6xl mx-auto px-4 sm:px-6">
            <div class="flex items-center justify-between h-16">
                <a href="/" class="flex items-center gap-2">
                    <div class="w-9 h-9 bg-white/10 backdrop-blur-md rounded-lg flex items-center justify-center border border-white/20">
                        <i data-lucide="landmark" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="text-white font-bold text-sm tracking-wide">KAS NGX</span>
                </a>
                <a href="/" class="ngx-back-link">
                    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
                    Kembali ke Beranda
                </a>
            </div>
        </div>
    </nav>

    <!-- Hero halaman -->
    <section class="ngx-page-hero pt-16 pb-24 px-4 sm:px-6">
        <div class="max-w-2xl mx-auto text-center pt-10">
            <div class="inline-flex items-center gap-2 bg-white/10 backdrop-blur-md border border-white/20 rounded-full px-4 py-1.5 mb-5">
                <i data-lucide="banknote" class="w-3.5 h-3.5 text-kop-200"></i>
                <span class="text-white/90 text-xs font-medium">Ajukan Pinjaman Anggota</span>
            </div>
            <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-white mb-3 drop-shadow-lg">
                Formulir Pinjaman
            </h1>
            <p class="text-white/70 text-sm sm:text-base max-w-lg mx-auto">
                Ajukan pinjaman dengan proses cepat dan mudah, langsung diproses tim Admin KAS NGX.
            </p>
        </div>
    </section>

    <div class="max-w-2xl mx-auto px-4 sm:px-6 -mt-14 pb-24">

        <form id="pinjamanForm" class="bg-white rounded-3xl p-6 sm:p-8 border border-gray-100 shadow-xl shadow-kop-900/5 space-y-5" autocomplete="off">

            <!-- Nama Anggota -->
            <div>
                <label class="ngx-form-label">Nama Anggota</label>
                <select id="pinjamanNamaSelect" required class="ngx-form-select">
                    <option value="" disabled selected>Pilih nama anggota</option>
                    <option value="ISLAFUDDIN AL ISLAMI">ISLAFUDDIN AL ISLAMI</option>
                    <option value="SAYYID MAFU RAHMAN">SAYYID MAFU RAHMAN</option>
                    <option value="TRIAS MARDIANTO">TRIAS MARDIANTO</option>
                    <option value="MOH FAJARUL ADAM">MOH FAJARUL ADAM</option>
                    <option value="FAHMI HUSAIN ASRORI">FAHMI HUSAIN ASRORI</option>
                    <option value="ROSIKHUL ILMI">ROSIKHUL ILMI</option>
                    <option value="AHMAD TIO HERMAWAN">AHMAD TIO HERMAWAN</option>
                    <option value="ROHID MURTAFISHOLEH">ROHID MURTAFISHOLEH</option>
                    <option value="MUHAMMAD FAHRIL AGUSTO">MUHAMMAD FAHRIL AGUSTO</option>
                    <option value="MUHAMMAD JAMALLUDIN AL">MUHAMMAD JAMALLUDIN AL</option>
                    <option value="RAHMAT AGUNG">RAHMAT AGUNG</option>
                    <option value="MUHAMMAD BEJA PRASETYA">MUHAMMAD BEJA PRASETYA</option>
                    <option value="RAFLY BAGAS MAULANA">RAFLY BAGAS MAULANA</option>
                    <option value="KHAMZAH MUKHOYAR">KHAMZAH MUKHOYAR</option>
                    <option value="MUHAMMAD AJI NUGRAHA">MUHAMMAD AJI NUGRAHA</option>
                    <option value="DISTRIA REVANA">DISTRIA REVANA</option>
                    <option value="SHAKILATU ZAHRA">SHAKILATU ZAHRA</option>
                    <option value="PRADITA INTAN">PRADITA INTAN</option>
                    <option value="MILA ERDIANA">MILA ERDIANA</option>
                    <option value="__lainnya__">Lainnya...</option>
                </select>
                <input type="text" id="pinjamanNamaLainnya" placeholder="Ketik nama Anda" class="ngx-form-input hidden mt-2">
            </div>

            <!-- Alasan Kebutuhan Meminjam -->
            <div>
                <label class="ngx-form-label">Alasan Kebutuhan Meminjam</label>
                <textarea id="pinjamanAlasan" required placeholder="Ceritakan kebutuhan Anda" class="ngx-form-textarea"></textarea>
            </div>

            <!-- Nama Toko -->
            <div>
                <label class="ngx-form-label">Nama Toko</label>
                <select id="pinjamanNamaToko" required class="ngx-form-select">
                    <option value="" disabled selected>Pilih nama toko</option>
                    <option value="ALISHASTORE">ALISHASTORE</option>
                    <option value="ARUMYSTORE">ARUMYSTORE</option>
                    <option value="AURELIASTORE">AURELIASTORE</option>
                    <option value="AYUNDASHOP">AYUNDASHOP</option>
                    <option value="HAZMYSTORE">HAZMYSTORE</option>
                    <option value="OLIVIASTORE">OLIVIASTORE</option>
                    <option value="MADINASTORE">MADINASTORE</option>
                    <option value="KIMBERLYSTORE">KIMBERLYSTORE</option>
                    <option value="DEVIERASTORE">DEVIERASTORE</option>
                    <option value="EVANNASTORE">EVANNASTORE</option>
                    <option value="RAISYASTORE">RAISYASTORE</option>
                    <option value="LYODRASHOP">LYODRASHOP</option>
                    <option value="FIDELASTORE">FIDELASTORE</option>
                    <option value="AERASTORE">AERASTORE</option>
                    <option value="AJIZI STORE">AJIZI STORE</option>
                    <option value="CUSTOMER SERVIS">CUSTOMER SERVIS</option>
                    <option value="UMUM">UMUM</option>
                </select>
            </div>

            <!-- Grup Partner -->
            <div>
                <label class="ngx-form-label">Grup Partner</label>
                <select id="pinjamanGrupPartner" required class="ngx-form-select">
                    <option value="" disabled selected>Pilih Grup Partner</option>
                    <option value="BMX">BMX</option>
                    <option value="BNR">BNR</option>
                    <option value="UMUM">UMUM</option>
                </select>
            </div>

            <!-- Jatuh Tempo -->
            <div>
                <label class="ngx-form-label">Jatuh Tempo</label>
                <input type="date" id="pinjamanJatuhTempo" required class="ngx-form-input">
            </div>

            <!-- Nomor HP -->
            <div>
                <label class="ngx-form-label">Nomor HP/WhatsApp</label>
                <input type="tel" id="pinjamanNoHp" required placeholder="08xxxxxxxxxx" class="ngx-form-input">
            </div>

            <!-- Atas Nama -->
            <div>
                <label class="ngx-form-label">Atas Nama Rekening</label>
                <input type="text" id="pinjamanAtasNama" required placeholder="Nama sesuai rekening penerima" class="ngx-form-input">
            </div>

            <!-- Nomor Rekening -->
            <div>
                <label class="ngx-form-label">Nomor Rekening</label>
                <input type="text" inputmode="numeric" id="pinjamanNoRekening" required placeholder="Contoh: 1234567890" class="ngx-form-input">
            </div>

            <!-- Nama Bank -->
            <div>
                <label class="ngx-form-label">Nama Bank</label>
                <select id="pinjamanNamaBank" required class="ngx-form-select">
                    <option value="" disabled selected>Pilih nama bank</option>
                    <option value="BCA">BCA</option>
                    <option value="BRI">BRI</option>
                    <option value="BNI">BNI</option>
                    <option value="Mandiri">Mandiri</option>
                    <option value="CIMB Niaga">CIMB Niaga</option>
                    <option value="BTN">BTN</option>
                    <option value="SeaBank">SeaBank</option>
                    <option value="Jago">Jago</option>
                    <option value="Neo">Neo</option>
                    <option value="Permata">Permata</option>
                    <option value="Danamon">Danamon</option>
                    <option value="OCBC">OCBC</option>
                    <option value="__lainnya__">Lainnya...</option>
                </select>
                <input type="text" id="pinjamanNamaBankLainnya" placeholder="Ketik nama bank Anda" class="ngx-form-input hidden mt-2">
            </div>

            <!-- Nominal Pinjaman -->
            <div>
                <label class="ngx-form-label">Nominal Pinjaman</label>
                <input type="text" inputmode="numeric" id="pinjamanNominal" required placeholder="Rp 0" class="ngx-form-input">
            </div>

            <!-- Email -->
            <div>
                <label class="ngx-form-label">Email</label>
                <input type="email" id="pinjamanEmail" required placeholder="nama@email.com" class="ngx-form-input">
            </div>

            <!-- Persetujuan -->
            <div class="ngx-checkbox-row">
                <input type="checkbox" id="pinjamanSetuju" required>
                <label for="pinjamanSetuju">Saya telah membaca, memahami, dan menyetujui seluruh <a href="https://docs.google.com/document/d/1JlvdOKDolM-Nz39GJ6Pwf8gZlEx9pNdsrpV3y8bQLaw/edit?usp=sharing" target="_blank" rel="noopener">Syarat &amp; Ketentuan Pinjaman KAS NGX</a>.</label>
            </div>

            <!-- Error -->
            <p id="pinjamanFormError" class="hidden text-xs text-red-600 flex items-start gap-1.5">
                <i data-lucide="alert-circle" class="w-3.5 h-3.5 flex-shrink-0 mt-0.5"></i>
                <span></span>
            </p>

            <!-- Submit -->
            <button type="submit" id="pinjamanSubmitBtn" class="w-full inline-flex items-center justify-center gap-2 bg-kop-700 text-white text-sm font-bold py-3.5 rounded-xl hover:bg-kop-800 transition shadow-md">
                <i data-lucide="send" class="w-4 h-4"></i>
                <span>Ajukan Pinjaman</span>
            </button>

        </form>
    </div>

    <!-- Footer -->
    <footer class="bg-kop-950 text-white py-10 px-4 sm:px-6">
        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="w-11 h-11 bg-kop-700 rounded-xl flex items-center justify-center">
                    <i data-lucide="landmark" class="w-5 h-5 text-white"></i>
                </div>
                <div>
                    <h3 class="text-sm font-bold">SIMPAN PINJAM KAS NGX</h3>
                    <p class="text-xs text-white/40">Nyaman &mdash; Sejahtera</p>
                </div>
            </div>
            <a href="/" class="text-xs text-white/60 hover:text-white transition">&larr; Kembali ke Beranda</a>
        </div>
    </footer>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="/script.js"></script>
</body>
</html>
